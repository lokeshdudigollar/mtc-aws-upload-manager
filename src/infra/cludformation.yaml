AWSTemplateFormatVersion: "2010-09-09"

Resources:

  ImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: image-bucket

  ImagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Images
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: imageId
          AttributeType: S
        - AttributeName: idempotencyKey
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: imageId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: IdempotencyKeyIndex
          KeySchema:
            - AttributeName: idempotencyKey
              KeyType: HASH
          Projection:
            ProjectionType: ALL